<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>퇴근런 타이머</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <script src="./renderer.js"></script>
  </head>
  <body>
    <div id="box" class="box">
      <!-- <button type="button" id="btnClose" class="btn-close">필요없어</button> -->
      <h1 id="title" class="title"></h1>
      <div id="timer" class="timer">
        <span id="timer-hour" class="unit">
          <span class="unit-number"></span>
          <span class="unit-text">시간</span>
        </span>
        <span id="timer-min" class="unit">
          <span class="unit-number"></span>
          <span class="unit-text">분</span>
        </span>
        <span id="timer-sec" class="unit">
          <span class="unit-number"></span>
          <span class="unit-text">초</span>
        </span>
      </div>
    </div>
  </body>
</html>
