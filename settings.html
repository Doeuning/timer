<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>설정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --green: #00af6b;
        --green-light: #00d483;
        --green-dim: rgba(0, 175, 107, 0.15);
        --green-border: rgba(0, 175, 107, 0.5);
        --bg: #111318;
        --bg2: #1c2028;
        --bg3: #252b36;
        --border: #4a5568;
        --border-bright: #606878;
        --text: #ffffff;
        --text-muted: #d0d8e8;
        --text-dim: #8a95a5;
        --red: #ff5f5f;
        --red-dim: rgba(255, 95, 95, 0.15);
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* 타이틀바 */
      .titlebar {
        -webkit-app-region: drag;
        height: 44px;
        background: var(--bg2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        border-bottom: 1px solid var(--green);
        flex-shrink: 0;
      }
      .titlebar-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text);
        letter-spacing: 0.04em;
      }
      .btn-close {
        -webkit-app-region: no-drag;
        width: 28px;
        height: 28px;
        border: 1px solid var(--border-bright);
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 6px;
        font-size: 13px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .btn-close:hover {
        background: var(--red-dim);
        border-color: var(--red);
        color: var(--red);
      }

      /* 스크롤 영역 */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 20px 18px 10px;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .content::-webkit-scrollbar {
        width: 4px;
      }
      .content::-webkit-scrollbar-track {
        background: transparent;
      }
      .content::-webkit-scrollbar-thumb {
        background: var(--border-bright);
        border-radius: 4px;
      }

      /* 섹션 라벨 */
      .section-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--green-light);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .section-label::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--green-border);
      }

      /* 퇴근시간 입력 */
      .time-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .time-input-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="number"] {
        width: 62px;
        padding: 8px 6px;
        background: var(--bg3);
        border: 1px solid var(--border-bright);
        border-radius: 8px;
        color: var(--text);
        font-size: 22px;
        font-weight: 700;
        font-family: "Pretendard", sans-serif;
        text-align: center;
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        -moz-appearance: textfield;
      }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
      }
      input[type="number"]:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 3px var(--green-dim);
      }
      .time-sep {
        font-size: 24px;
        font-weight: 700;
        color: var(--text-dim);
      }
      .time-unit {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-muted);
      }

      /* 알림 아이템 */
      .alert-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .alert-item {
        background: var(--bg2);
        border: 1px solid var(--border-bright);
        border-radius: 12px;
        padding: 12px 12px 10px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        transition: border-color 0.15s;
      }
      .alert-item:hover {
        border-color: var(--green-border);
      }

      .alert-item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .alert-time-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }
      .alert-time-row .time-input-wrap input[type="number"] {
        width: 50px;
        font-size: 16px;
        padding: 5px 4px;
        border-width: 1px;
      }
      .alert-time-row .time-unit {
        font-size: 12px;
      }
      .alert-time-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
        margin-left: 2px;
      }

      .btn-remove {
        width: 28px;
        height: 28px;
        background: transparent;
        border: 1px solid var(--border-bright);
        border-radius: 6px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        transition: all 0.15s;
        flex-shrink: 0;
      }
      .btn-remove:hover {
        background: var(--red-dim);
        border-color: var(--red);
        color: var(--red);
      }

      /* 스타일 선택 */
      .style-selector {
        display: flex;
        gap: 6px;
      }
      .style-btn {
        flex: 1;
        padding: 7px 4px;
        background: var(--bg3);
        border: 1px solid var(--border-bright);
        border-radius: 8px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 11px;
        font-family: "Pretendard", sans-serif;
        font-weight: 700;
        text-align: center;
        transition: all 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
      }
      .style-btn .icon {
        font-size: 16px;
      }
      .style-btn:hover {
        border-color: var(--green-border);
        color: var(--text);
      }
      .style-btn.active {
        background: var(--green-dim);
        border-color: var(--green);
        color: var(--green-light);
      }

      /* 알림 추가 버튼 */
      .btn-add {
        width: 100%;
        margin-top: 10px;
        padding: 11px;
        background: transparent;
        border: 1px solid var(--border-bright);
        border-radius: 10px;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 13px;
        font-family: "Pretendard", sans-serif;
        font-weight: 700;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn-add:hover {
        border-color: var(--green);
        color: var(--green-light);
        background: var(--green-dim);
      }

      /* 초과근무 */
      .overtime-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 16px;
        background: var(--bg2);
        border-radius: 10px;
        border: 1px solid var(--border-bright);
      }
      .overtime-label {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .toggle {
        position: relative;
        width: 42px;
        height: 24px;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--bg3);
        border: 1px solid var(--border-bright);
        border-radius: 24px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .toggle-slider::before {
        content: "";
        position: absolute;
        width: 14px;
        height: 14px;
        left: 3px;
        top: 3px;
        background: var(--text-dim);
        border-radius: 50%;
        transition:
          transform 0.2s,
          background 0.2s;
      }
      .toggle input:checked + .toggle-slider {
        background: var(--green-dim);
        border-color: var(--green);
      }
      .toggle input:checked + .toggle-slider::before {
        transform: translateX(18px);
        background: var(--green);
      }

      /* 하단 */
      .footer {
        padding: 10px 18px 16px;
        border-top: 1px solid var(--border-bright);
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
      }
      .save-feedback {
        text-align: center;
        font-size: 12px;
        font-weight: 700;
        color: var(--green-light);
        opacity: 0;
        transition: opacity 0.3s;
        height: 14px;
      }
      .save-feedback.show {
        opacity: 1;
      }

      .btn-save {
        width: 100%;
        padding: 13px;
        background: var(--green);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        font-family: "Pretendard", sans-serif;
        cursor: pointer;
        letter-spacing: 0.04em;
        transition:
          background 0.15s,
          transform 0.1s;
      }
      .btn-save:hover {
        background: var(--green-light);
      }
      .btn-save:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="titlebar">
      <span class="titlebar-title">⏰ 퇴근런 타이머 설정</span>
      <button class="btn-close" id="btnClose">✕</button>
    </div>

    <div class="content">
      <div>
        <div class="section-label">퇴근 시간</div>
        <div class="time-row">
          <div class="time-input-wrap">
            <input type="number" id="leaveHour" min="0" max="23" value="18" />
            <span class="time-unit">시</span>
          </div>
          <span class="time-sep">:</span>
          <div class="time-input-wrap">
            <input type="number" id="leaveMin" min="0" max="59" value="0" />
            <span class="time-unit">분</span>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">알림 시점</div>
        <div class="alert-list" id="alertList"></div>
        <button class="btn-add" id="btnAddAlert">＋ 알림 추가</button>
      </div>

      <div>
        <div class="section-label">초과근무</div>
        <div class="overtime-row">
          <span class="overtime-label">초과근무 카운트업</span>
          <label class="toggle">
            <input type="checkbox" id="overtimeToggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="save-feedback" id="feedback">저장됐어요 ✓</div>
      <button class="btn-save" id="btnSave">저장하기</button>
    </div>

    <script src="./settings-renderer.js"></script>
  </body>
</html>
